<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОшМУ - Бөлүмдөр</title>
    <style>
        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .menu-card {
            background-color: rgba(255, 255, 255, 0.96);
            padding: 40px;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 {
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }
        /* Баскычтардын торчосу (сетка) */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Эки катар кылып бөлөт */
            gap: 15px; /* Баскычтардын ортосундагы аралык */
            margin-bottom: 30px;
        }
        .sub-btn {
            display: block;
            padding: 15px 20px;
            background-color: #f3f4f6;
            color: #1e3a8a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .sub-btn:hover {
            background-color: #1e3a8a;
            color: white;
            border-color: #1e3a8a;
            transform: translateY(-2px);
        }
        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: #4b5563;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background-color: #1f2937;
        }
    </style>
</head>
<body>

    <div class="menu-card">
        <h2>ОшМУ Маалымат Борбору</h2>
        <p class="subtitle">Керектүү бөлүмдү тандап, кенен маалымат алыңыз:</p>
        
        <div class="buttons-grid">
            <a href="faculties.html" class="sub-btn">🏛 Факультеттер</a>
            <a href="rector.html" class="sub-btn">👨‍💼 Ректорат</a>
            <a href="life.html" class="sub-btn">🎓 Студенттик жашоо</a>
            <a href="mission.html" class="sub-btn">🎯 Университеттин миссиясы</a>
        </div>

        <a href="index.html" class="back-btn">⬅ Башкы бетке кайтуу</a>
    </div>

</body>
</html>
