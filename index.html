<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ош мамлекеттик университети</title>
    <style>
        body {
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .site-logo {
            width: 140px;
            height: auto;
            margin: 20px 0;
        }
        h1 {
            color: #1e3a8a;
            font-size: 30px;
            margin: 0;
        }
        p {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #1e3a8a;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.4);
            transition: all 0.3s ease;
        }
        .btn-link:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Ош мамлекеттик университети</h1>
        <img src="logo.png" alt="ОшМУ Логотип" class="site-logo">
        <p>Кош келиңиз! Бул жөнөкөй сайт ОшМУ тууралуу маалымат берет.</p>
        <a href="about.html" class="btn-link">Университет тууралуу маалымат</a>
    </div>

</body>
</html>
